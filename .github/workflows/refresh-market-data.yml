name: Refresh market datasets

on:
  schedule:
    - cron: '15 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Refresh stock + infra snapshots
        run: python scripts/refresh_market_data.py
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/stock-ticker.json data/infra-rates.json
          git diff --cached --quiet || git commit -m "chore: refresh market datasets"
          git push

name: Daily AI Digest Refresh

on:
  schedule:
    - cron: '10 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Generate digest
        run: python scripts/fetch_digest.py
      - name: Commit digest if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/digest.json
          git diff --cached --quiet || git commit -m "chore: refresh AI daily digest"
          git push
